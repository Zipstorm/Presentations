<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="glow-teal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#2DD4BF" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#A78BFA" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4A90D9" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gray" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#94a3b8" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow-teal" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#2DD4BF"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#A78BFA"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4A90D9"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>

    <linearGradient id="grad-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="grad-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="540" fill="#0f172a" rx="14"/>

  <!-- ZONE BACKGROUNDS -->

  <!-- External Zone -->
  <rect x="14" y="14" width="130" height="512" rx="12" fill="#64748b" fill-opacity="0.05" stroke="#64748b" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="79" y="38" text-anchor="middle" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.1em">EXTERNAL</text>

  <!-- Hiring Side Zone -->
  <rect x="164" y="14" width="480" height="240" rx="12" fill="#2DD4BF" fill-opacity="0.03" stroke="#2DD4BF" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="404" y="38" text-anchor="middle" fill="#2DD4BF" fill-opacity="0.65" font-size="12" font-weight="700" letter-spacing="0.1em">HIRING SIDE</text>

  <!-- Prospect Side Zone -->
  <rect x="164" y="278" width="480" height="248" rx="12" fill="#A78BFA" fill-opacity="0.03" stroke="#A78BFA" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="404" y="298" text-anchor="middle" fill="#A78BFA" fill-opacity="0.65" font-size="12" font-weight="700" letter-spacing="0.1em">PROSPECT SIDE</text>

  <!-- Bridge Zone -->
  <rect x="668" y="14" width="518" height="512" rx="12" fill="#4A90D9" fill-opacity="0.03" stroke="#4A90D9" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="927" y="38" text-anchor="middle" fill="#4A90D9" fill-opacity="0.65" font-size="12" font-weight="700" letter-spacing="0.1em">BRIDGE</text>

  <!-- EDGES -->

  <!-- viewed_by: Job/CL to External Viewer (dashed arc across top) -->
  <path d="M 1050,68 C 1050,4 79,4 79,240" fill="none" stroke="#475569" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrow-gray)" opacity="0.55"/>
  <rect x="495" y="0" width="80" height="20" rx="10" fill="#0f172a" stroke="#64748b" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="535" y="14" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">viewed_by</text>

  <!-- signs_up_as: External Viewer to User (HM) -->
  <path d="M 132,252 C 175,235 205,168 245,168" fill="none" stroke="#64748b" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrow-gray)" opacity="0.65"/>
  <rect x="148" y="196" width="82" height="20" rx="10" fill="#0f172a" stroke="#64748b" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="189" y="210" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">signs_up_as</text>

  <!-- signs_up_as: External Viewer to User (Prospect) -->
  <path d="M 132,288 C 175,305 205,410 245,410" fill="none" stroke="#64748b" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrow-gray)" opacity="0.65"/>
  <rect x="148" y="342" width="82" height="20" rx="10" fill="#0f172a" stroke="#64748b" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="189" y="356" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">signs_up_as</text>

  <!-- invites: HM and Team (bidirectional curved) -->
  <path d="M 420,148 Q 440,102 465,98" fill="none" stroke="#2DD4BF" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.8"/>
  <path d="M 465,118 Q 440,122 420,166" fill="none" stroke="#2DD4BF" stroke-width="1.5" marker-end="url(#arrow-teal)" opacity="0.8"/>
  <rect x="410" y="115" width="56" height="20" rx="10" fill="#0f172a" stroke="#2DD4BF" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="438" y="129" text-anchor="middle" fill="#2DD4BF" font-size="10" font-weight="600">invites</text>

  <!-- creates / collaborates_on / shares: Team to Job -->
  <path d="M 570,98 L 1010,98" fill="none" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>
  <rect x="690" y="68" width="190" height="20" rx="10" fill="#0f172a" stroke="#4A90D9" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="785" y="82" text-anchor="middle" fill="#4A90D9" font-size="10" font-weight="500">creates / collaborates_on / shares</text>

  <!-- reviews: Team to EOI -->
  <path d="M 570,112 C 640,140 700,210 750,272" fill="none" stroke="#4A90D9" stroke-width="1.3" marker-end="url(#arrow-blue)" opacity="0.65"/>
  <rect x="634" y="176" width="58" height="20" rx="10" fill="#0f172a" stroke="#4A90D9" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="663" y="190" text-anchor="middle" fill="#4A90D9" font-size="10" font-weight="500">reviews</text>

  <!-- reviews: HM to EOI -->
  <path d="M 420,186 C 540,218 670,252 750,280" fill="none" stroke="#4A90D9" stroke-width="1.3" marker-end="url(#arrow-blue)" opacity="0.65"/>
  <rect x="558" y="230" width="58" height="20" rx="10" fill="#0f172a" stroke="#4A90D9" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="587" y="244" text-anchor="middle" fill="#4A90D9" font-size="10" font-weight="500">reviews</text>

  <!-- shares: Prospect to CustomLink -->
  <path d="M 412,392 Q 440,370 470,358" fill="none" stroke="#A78BFA" stroke-width="1.3" marker-end="url(#arrow-purple)" opacity="0.8"/>
  <rect x="408" y="362" width="52" height="20" rx="10" fill="#0f172a" stroke="#A78BFA" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="434" y="376" text-anchor="middle" fill="#A78BFA" font-size="10" font-weight="500">shares</text>

  <!-- creates_link: Prospect to CustomLink -->
  <path d="M 412,428 Q 460,450 500,390 Q 504,380 498,370" fill="none" stroke="#A78BFA" stroke-width="1.3" marker-end="url(#arrow-purple)" opacity="0.8"/>
  <rect x="435" y="428" width="76" height="20" rx="10" fill="#0f172a" stroke="#A78BFA" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="473" y="442" text-anchor="middle" fill="#A78BFA" font-size="10" font-weight="500">creates_link</text>

  <!-- expresses_interest: Prospect to EOI -->
  <path d="M 412,408 C 550,400 670,345 750,300" fill="none" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arrow-purple)" opacity="0.8"/>
  <rect x="525" y="390" width="114" height="20" rx="10" fill="#0f172a" stroke="#A78BFA" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="582" y="404" text-anchor="middle" fill="#A78BFA" font-size="10" font-weight="500">expresses_interest</text>

  <!-- targets: EOI to Job -->
  <path d="M 940,278 C 975,245 1005,185 1035,122" fill="none" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>
  <rect x="960" y="198" width="55" height="20" rx="10" fill="#0f172a" stroke="#4A90D9" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="988" y="212" text-anchor="middle" fill="#4A90D9" font-size="10" font-weight="500">targets</text>

  <!-- viewed_by: CL to External (dashed arc bottom) -->
  <path d="M 490,370 C 310,480 150,460 79,300" fill="none" stroke="#475569" stroke-width="1.3" stroke-dasharray="6 4" marker-end="url(#arrow-gray)" opacity="0.45"/>
  <rect x="228" y="448" width="80" height="20" rx="10" fill="#0f172a" stroke="#64748b" stroke-opacity="0.3" stroke-width="0.8"/>
  <text x="268" y="462" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">viewed_by</text>

  <!-- NODES -->

  <!-- External Viewer -->
  <g filter="url(#glow-gray)">
    <rect x="20" y="248" width="118" height="48" rx="10" fill="url(#grad-gray)" stroke="#94a3b8" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="79" y="277" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">External Viewer</text>
  </g>

  <!-- User (as hiring_manager) -->
  <g filter="url(#glow-teal)">
    <rect x="235" y="146" width="195" height="48" rx="10" fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="332" y="175" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">User <tspan fill="#2DD4BF" font-size="11.5" font-weight="400">(hiring_manager)</tspan></text>
  </g>

  <!-- User (as team) -->
  <g filter="url(#glow-teal)">
    <rect x="455" y="74" width="126" height="48" rx="10" fill="url(#grad-teal)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="518" y="103" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">User <tspan fill="#2DD4BF" font-size="11.5" font-weight="400">(team)</tspan></text>
  </g>

  <!-- User (as prospect) -->
  <g filter="url(#glow-purple)">
    <rect x="235" y="390" width="180" height="48" rx="10" fill="url(#grad-purple)" stroke="#A78BFA" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="325" y="419" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">User <tspan fill="#A78BFA" font-size="11.5" font-weight="400">(prospect)</tspan></text>
  </g>

  <!-- CustomLink -->
  <g filter="url(#glow-purple)">
    <rect x="460" y="335" width="120" height="48" rx="10" fill="url(#grad-purple)" stroke="#A78BFA" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="520" y="364" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">CustomLink</text>
  </g>

  <!-- ExpressionOfInterest -->
  <g filter="url(#glow-blue)">
    <rect x="740" y="266" width="210" height="48" rx="10" fill="url(#grad-blue)" stroke="#4A90D9" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="845" y="295" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">ExpressionOfInterest</text>
  </g>

  <!-- Job -->
  <g filter="url(#glow-blue)">
    <rect x="1012" y="74" width="76" height="48" rx="10" fill="url(#grad-blue)" stroke="#4A90D9" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="1050" y="103" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Job</text>
  </g>

</svg>
